<div class="d-flex p-2 my-3 bg-white rounded shadow-sm">
  <div class="d-flex align-items-center me-auto">
    <i class="{{ icon }} me-3"></i>
    <div class="lh-1">
      <p class="h5 mb-1">{{ titulo }}</p>
      <small style="font-size: 11px;">{{ subtitulo }}</small>
    </div>
  </div>
  <div class="p-3" *ngIf="btnListar">
    <button class="btn btn-secondary" (click)="listar()">Listar</button>
  </div>
</div>
