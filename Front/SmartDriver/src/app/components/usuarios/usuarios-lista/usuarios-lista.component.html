<div class="card rounded shadow-sm p-3">
  <div class="d-flex">
    <div class="flex-fill pe-3 mb-2">
      <div class="input-group">
        <span class="input-group-text"><i class="fa fa-search"></i></span>
        <input
          type="text"
          class="form-control"
          placeholder="Buscar por login, nome ou setor..."
          [(ngModel)]="filtroUsers"
        />
      </div>
    </div>
    <div>
      <button class="d-flex btn btn-success" routerLink="/user/profile">
        <i class="fa fa-plus my-1"></i>
      </button>
    </div>
  </div>
  <div class="row">
    <div class="col-sm-3 p-3" *ngFor="let user of usersFiltrados">
      <div class="card shadow-sm">
        <div class="card-header">
          <small style="font-size: 12px"
            ><i class="fa fa-id-badge me-2"></i>{{ user.fullName }}</small
          >
        </div>
        <img
          src="https://cdn.pixabay.com/photo/2012/04/26/19/43/profile-42914_960_720.png"
          height="80"
          class="rounded-circle align-self-center w-40 mt-3"
        />
        <div class="card-body text-center">
          <div class="h4 card-title fw-bold">@{{ user.userName }}</div>
          <small><b>Setor: </b>{{ user.setor }}</small>
        </div>
        <div class="d-flex m-auto pb-4">
          <div class="btn-group">
            <button
              class="btn btn-lg btn-warning"
              tooltip="Editar"
              routerLink="/user/profile/{{ user.id }}"
            >
              <i class="fa fa-edit"></i>
            </button>
            <button
              class="btn btn-lg btn-danger"
              tooltip="Excluir"
              (click)="openModal($event, musuario, user.id, user.fullName, user.setor)"
            >
              <i class="fa fa-trash"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="text-danger text-center" *ngIf="!usersFiltrados.length">
    <h5>Nenhum registro encontrado.</h5>
  </div>
</div>

<ng-template #musuario>
  <div class="modal-header bg-primary text-white">Confirmar exclusão?</div>
  <div class="modal-body text-center">
    <p>
      <b>Usuário: </b>{{ this.usernome }}<br />
      <b>Setor:</b> {{ this.usersetor }}
    </p>
    <button type="button" class="btn btn-danger" (click)="decline()">
      Não
    </button>
    <button type="button" class="btn btn-success" (click)="confirm()">
      Sim
    </button>
  </div>
</ng-template>
